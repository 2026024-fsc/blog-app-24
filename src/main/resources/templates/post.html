<body>
    <header>
        <h1>ブログ</h1>
        <a href="/main">ブログ一覧</a>
        <a href="/post">新規投稿</a>

    </header>



    <h2>新規投稿</h2>
    <form th:action="@{/main}" method="post">
        <!-- タイトル送信フォームを作る -->
        <div class="blogTitle">
            <label for="title">タイトル</label><br>
            <input type="text" name="title" placeholder="タイトル"><br>
        </div>

        <!-- 本文入力フォームを作る -->
        <div class="blogMainText">
            <label for="mainText">本文</label><br>
            <textarea name="main_text" placeholder="本文"
            minlength="1" maxlength="1000" cols="100" rows="10"></textarea><br>
        </div>

        <!-- 保存・キャンセルボタン -->
         <div>
            <button type="submit">保存</button>
            <a th:href="@{/main}">キャンセル</th>
         </div>
    </form>
</body>
</html>
